name: Cascade Next PR

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Merged-into release branch to test manually"
        required: true
        type: string
      merged_pr_number:
        description: "Merged PR number for manual testing"
        required: false
        type: string
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cascade-next:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Create next cascade PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CASCADE_GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const isManual = context.eventName === 'workflow_dispatch';

            const baseBranch = isManual
              ? context.payload.inputs?.base_branch
              : context.payload.pull_request?.base?.ref;
            
            const mergedPrNumber = isManual
              ? (context.payload.inputs?.merged_pr_number || 'manual-test')
              : context.payload.pull_request?.number;

            core.info(`Event: ${context.eventName}`);
            core.info(`Manual inputs: ${JSON.stringify(context.payload.inputs || {})}`);
            core.info(`Base branch: ${baseBranch}`);
            core.info(`Merged PR number: ${mergedPrNumber}`);
            
            if (!baseBranch) {
              core.setFailed('Base branch could not be determined.');
              return;
            }

            const releaseRegex = /^release\/(?<app>[A-Za-z0-9._-]+)_(?<version>\d+\.\d{2})(?:[-_].*)?$/;

            function parseBranch(branch) {
              const match = branch.match(releaseRegex);
              if (!match) return null;
              const { app, version } = match.groups;
              return {
                branch,
                app,
                version,
                versionParts: version.split('.').map(v => parseInt(v, 10))
              };
            }

            function compareVersionOnly(a, b) {
              const len = Math.max(a.versionParts.length, b.versionParts.length);
              for (let i = 0; i < len; i++) {
                const av = a.versionParts[i] ?? 0;
                const bv = b.versionParts[i] ?? 0;
                if (av < bv) return -1;
                if (av > bv) return 1;
              }
              return 0;
            }

            const current = parseBranch(baseBranch);
            if (!current) {
              core.info(`Base branch '${baseBranch}' does not match cascade pattern. Exiting.`);
              return;
            }

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100
            });

            const parsedBranches = branches
              .map(b => parseBranch(b.name))
              .filter(Boolean)
              .filter(b => b.app === current.app)
              .sort(compareVersionOnly);

            if (parsedBranches.length === 0) {
              core.info(`No matching release branches found for app '${current.app}'. Exiting.`);
              return;
            }

            core.info(`Eligible ordered branches for app '${current.app}': ${parsedBranches.map(b => b.branch).join(' -> ')}`);

            const currentIndex = parsedBranches.findIndex(b => b.branch === current.branch);
            if (currentIndex === -1) {
              core.setFailed(`Current branch '${current.branch}' not found in filtered branch list.`);
              return;
            }

            if (currentIndex === parsedBranches.length - 1) {
              core.info(`'${current.branch}' is the last eligible branch. No downstream PR needed.`);
              return;
            }

            const nextBranch = parsedBranches[currentIndex + 1].branch;
            core.info(`Next cascade target branch: ${nextBranch}`);

            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: nextBranch,
              per_page: 100
            });

            const existing = openPRs.find(pr => pr.head.ref === current.branch);
            if (existing) {
              core.info(`Open cascade PR already exists: #${existing.number} (${current.branch} -> ${nextBranch}).`);
              return;
            }

            const title = `[Cascade] ${current.branch} -> ${nextBranch}`;
            const body = [
              `This PR was created automatically after PR #${mergedPrNumber} was merged into \`${current.branch}\`.`,
              ``,
              `### Cascade behavior`,
              `- Only the immediate next cascade PR is created.`,
              `- If this PR has conflicts, the cascade stops here.`,
              `- After this PR is resolved and merged, the next downstream cascade PR will be raised automatically.`,
              ``,
              `### Details`,
              `- App: \`${current.app}\``,
              `- Current version: \`${current.version}\``,
              `- Source branch: \`${current.branch}\``,
              `- Target branch: \`${nextBranch}\``
            ].join('\n');

            let created;
            try {
              created = await github.rest.pulls.create({
                owner,
                repo,
                head: current.branch,
                base: nextBranch,
                title,
                body,
                maintainer_can_modify: true
              });
            } catch (error) {
              if (error.status === 422) {
                core.warning(`PR could not be created, possibly because there is no diff or an equivalent PR already exists. ${error.message}`);
                return;
              }
              throw error;
            }

            const prNumber = created.data.number;
            core.info(`Created cascade PR #${prNumber}`);

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['cascade-pr']
              });
            } catch (e) {
              core.warning(`Could not add cascade-pr label. ${e.message}`);
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: prNumber,
                reviewers: [owner]
              });
              core.info(`Requested review from repository owner '${owner}'.`);
            } catch (e) {
              core.warning(`Could not request reviewer '${owner}'. ${e.message}`);
            }

            async function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            let prDetails = null;
            for (let i = 0; i < 6; i++) {
              const resp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });
              prDetails = resp.data;
              if (prDetails.mergeable !== null) break;
              await sleep(2000);
            }

            core.info(`PR #${prNumber} mergeable = ${prDetails?.mergeable}`);

            if (prDetails?.mergeable === false) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['cascade-conflict']
                });
              } catch (e) {
                core.warning(`Could not add cascade-conflict label. ${e.message}`);
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: [
                  `This cascade PR currently has merge conflicts.`,
                  ``,
                  `No further downstream cascade PRs will be created until this PR is resolved and merged.`,
                  `Once this PR is merged, the automation will raise the next cascade PR automatically.`
                ].join('\n')
              });

              core.info(`Cascade stopped because PR #${prNumber} has conflicts.`);
              return;
            }

            try {
              if (prDetails?.node_id && prDetails?.mergeable === true) {
                const mutation = `
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `;

                await github.graphql(mutation, {
                  pullRequestId: prDetails.node_id
                });

                core.info(`Auto-merge enabled for PR #${prNumber}`);
              } else {
                core.info(`Auto-merge not enabled because mergeability is not confirmed true yet.`);
              }
            } catch (e) {
              core.warning(`Could not enable auto-merge. Make sure repository auto-merge is enabled. ${e.message}`);
            }
